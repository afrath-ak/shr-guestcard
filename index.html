function callAppsScript(action, data = {}, timeoutMs = 25000) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
    let timeoutId;
    function cleanup() {
      clearTimeout(timeoutId);
      delete window[cbName];
      const el = document.getElementById(cbName);
      if (el) el.remove();
    }
    window[cbName] = function(result) {
      cleanup();
      console.log('[AppsScript] ' + action + ':', result);
      resolve(result);
    };
    timeoutId = setTimeout(function() {
      cleanup();
      reject(new Error('Request timed out (25s). Check Apps Script URL and deployment settings.'));
    }, timeoutMs);
    const params = new URLSearchParams({
      action: action,
      data: JSON.stringify(data),
      callback: cbName
    });
    const script = document.createElement('script');
    script.id = cbName;
    script.src = APP_SCRIPT_URL + '?' + params.toString();
    script.onerror = function() {
      cleanup();
      reject(new Error('Could not reach Apps Script. Verify the deployment URL is correct and "Who has access" is set to Anyone.'));
    };
    document.head.appendChild(script);
  });
}

function sanitize(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const match = String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (match) return `${match[3]}/${match[2]}/${match[1]}`;
  return dateStr;
}

const loginAttempts = {};
function checkRateLimit(key, maxAttempts = 5, windowMs = 5 * 60 * 1000) {
  const now = Date.now();
  const entry = loginAttempts[key] || { count: 0, first: now };
  if (now - entry.first > windowMs) { loginAttempts[key] = { count: 1, first: now }; return true; }
  if (entry.count >= maxAttempts) return false;
  entry.count++;
  loginAttempts[key] = entry;
  return true;
}

function getCsrfToken() {
  let t = sessionStorage.getItem('_csrf');
  if (!t) {
    const a = new Uint8Array(16);
    window.crypto?.getRandomValues(a);
    t = Array.from(a).map(b => b.toString(16).padStart(2,'0')).join('');
    sessionStorage.setItem('_csrf', t);
  }
  return t;
}

function validatePassword(pw) {
  if (!pw || pw.length < 8) return 'Password must be at least 8 characters.';
  if (!/[A-Za-z]/.test(pw)) return 'Password must contain at least one letter.';
  if (!/[0-9]/.test(pw)) return 'Password must contain at least one number.';
  return null;
}

// OTP DELIVERY — SERVER-SIDE via Google Apps Script
// (unchanged from original, works with Apps Script sendOTP)
async function sendOTP(email, _unused_otp, recipientName) {
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showLoginError('Please enter a valid email address.');
    return false;
  }
  showSpinner('Sending verification code…');
  try {
    const result = await callAppsScript('sendOTP', {
      email: email.trim(),
      name: recipientName || 'Valued Guest'
    });
    hideSpinner();
    if (result.success) {
      _otpServerToken = result.token;
      _otpTokenExpiry = Date.now() + 10 * 60 * 1000;
      const masked = email.replace(/(.{2})(.*)(@.*)/, '$1***$3');
      showToast(`Verification code sent to ${masked} ✉️`, 'ok');
      return true;
    } else {
      showLoginError(result.error || 'Could not send verification email.');
      return false;
    }
  } catch (err) {
    hideSpinner();
    showLoginError('Could not send verification email: ' + err.message);
    return false;
  }
}

async function verifyOTPWithServer(email, code) {
  if (!_otpServerToken) return false;
  if (Date.now() > _otpTokenExpiry) return false;
  try {
    const result = await callAppsScript('verifyOTP', {
      email: email.trim(),
      code: code.trim(),
      token: _otpServerToken
    });
    return result.success === true;
  } catch(e) {
    return false;
  }
}

function startOTPCountdown(elementId, seconds) {
  if (_otpCountdownTimer) clearInterval(_otpCountdownTimer);
  const el = document.getElementById(elementId);
  if (!el) return;
  let remaining = seconds;
  function tick() {
    if (remaining <= 0) {
      el.textContent = 'Code expired. Please request a new one.';
      el.style.color = '#fca5a5';
      clearInterval(_otpCountdownTimer);
      return;
    }
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    el.textContent = `Code expires in ${m}:${String(s).padStart(2,'0')}`;
    el.style.color = remaining <= 60 ? '#fbbf24' : 'rgba(255,255,255,0.4)';
    remaining--;
  }
  tick();
  _otpCountdownTimer = setInterval(tick, 1000);
}

async function guestPasswordLogin() {
  const guestId  = (document.getElementById('guest-id')?.value || '').trim().toUpperCase();
  const password = (document.getElementById('guest-password')?.value || '').trim();
  clearLoginError();
  if (!guestId)  { showLoginError('Please enter your Guest ID.'); return; }
  if (!password) { showLoginError('Please enter your password.'); return; }
  if (!checkRateLimit(`guest_pw_${guestId}`, 5)) { showLoginError('Too many failed attempts. Please wait 5 minutes.'); return; }
  showSpinner('Verifying…');
  try {
    const result = await callAppsScript('guestLogin', { guestId, password });
    hideSpinner();
    if (result.success) {
      currentUser = { type: 'guest', data: result.user };
      currentGuest = result.user;
      await loadGuestsFromBackend();
      saveSession(); applyUserSession(); startSessionTimer(); setupActivityListeners();
      showToast(`Welcome back, ${sanitize(result.user.first || 'Guest')}! 🌟`, 'ok');
      addLog(`${result.user.first || result.user.id} signed in (password)`);
    } else {
      showLoginError(result.error);
    }
  } catch (err) {
    hideSpinner();
    showLoginError(`Login failed: ${err.message}`);
  }
}

async function staffLogin() {
  const username = document.getElementById('staff-username').value.trim();
  const password = document.getElementById('staff-password').value.trim();
  clearLoginError();
  if (!username || !password) { showLoginError('Please enter username and password.'); return; }
  if (!checkRateLimit(`staff_${username}`, 5)) { showLoginError('Too many failed attempts. Please wait 5 minutes.'); return; }
  showSpinner('Authenticating…');
  try {
    const result = await callAppsScript('staffLogin', { username, password });
    hideSpinner();
    if (result.success) {
      currentUser = { type: 'staff', data: result.user };
      saveSession(); applyUserSession(); startSessionTimer(); setupActivityListeners();
      addLog(`${result.user.fullname} signed in (${result.user.role || 'staff'})`);
      showToast(`Welcome back, ${sanitize(result.user.fullname)}! 👋`, 'ok');
      await Promise.all([

}

async function hashPasswordFrontend(password, salt) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + salt);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function generateSalt() {
  return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function saveStaffMember() {
  const username = document.getElementById('new-username').value.trim();
  const fullname = document.getElementById('new-fullname').value.trim();
  const password = document.getElementById('new-password').value;
  const role = document.getElementById('new-role')?.value || 'staff';
  const dept = document.getElementById('new-dept')?.value || '';
  const email = document.getElementById('new-email')?.value?.trim() || '';
  const phone = document.getElementById('new-phone')?.value?.trim() || '';
  const accountStatus = document.getElementById('new-account-status')?.value || 'active';
  const editId = document.getElementById('edit-staff-id').value;
  if (!username || !fullname) { showToast('Username and full name are required', 'err'); return; }
  if (editId) {
    const staff = staffUsers.find(u => u.id === editId);
    if (!staff) return;
    const updateData = { username, fullname, role, department: dept, email, phone, accountStatus };
    if (password && password.length >= 8) {
      const pwErr = validatePassword(password);
      if (pwErr) { showToast(pwErr, 'err'); return; }
      const newSalt = generateSalt();
      const newHash = await hashPasswordFrontend(password, newSalt);
      updateData.password_hash = newHash;
      updateData.salt = newSalt;
    }
    const result = await callAppsScript('updateStaff', { staffId: editId, data: updateData });
    if (result.success) {
      Object.assign(staff, updateData);
      saveStaffLocal(); renderStaffUsers();
      showToast('✅ Team member updated', 'ok');
      addLog(`${currentUser?.data?.fullname} updated team member: ${username}`);
    }
  } else {
    if (staffUsers.find(u => u.username === username)) { showToast('Username already exists', 'err'); return; }
    if (!password) { showToast('Password required for new accounts', 'err'); return; }
    const pwErr = validatePassword(password); if (pwErr) { showToast(pwErr, 'err'); return; }
    const salt = generateSalt();
    const passwordHash = await hashPasswordFrontend(password, salt);
    const newStaff = { id: Date.now().toString(), username, fullname, role, department: dept, email, phone, accountStatus, twofa_secret: '', createdAt: new Date().toISOString(), createdBy: currentUser?.data?.username || 'admin', lastLogin: '', mustChangePassword: true };
    const result = await callAppsScript('createStaff', { staffData: newStaff, salt, passwordHash });
    if (result.success) {
      staffUsers.push({ ...newStaff }); saveStaffLocal(); renderStaffUsers();
      showToast(`✅ Account created for ${sanitize(fullname)}`, 'ok');
      addLog(`${currentUser?.data?.fullname} created account: ${username} (${role})`);
    } else {
      showToast('Error creating account: ' + (result.error || 'unknown error'), 'err');
    }
  }
  closeStaffModal();
}

async function deleteStaff(staffId) {
  if (!confirm('⚠️ Are you sure you want to permanently remove this team member?')) return;
  const result = await callAppsScript('deleteStaff', { staffId });
  if (result.success) {

    saveStaffLocal(); renderStaffUsers();
    showToast('Team member removed successfully', 'ok');
    addLog(`${currentUser?.data?.fullname} deleted team member`);
  }
}

async function toggleStaffStatus(staffId) {
  const staff = staffUsers.find(u => u.id === staffId);
  if (!staff) return;
  const newStatus = staff.accountStatus === 'suspended' ? 'active' : 'suspended';

  if (result.success) {
    staff.accountStatus = newStatus;

    showToast(`Account ${newStatus === 'suspended' ? 'suspended' : 'reactivated'}: ${sanitize(staff.fullname)}`, newStatus === 'suspended' ? 'err' : 'ok');
    addLog(`${currentUser?.data?.fullname} ${newStatus === 'suspended' ? 'suspended' : 'reactivated'} account: ${staff.username}`);
  }
}

  }
  if (stayEl) {
    const rows = [
      ['Guest ID', g.id], ['Title', g.title], ['Full Name', `${g.first} ${g.last}`],
      ['Room', g.room || 'TBA'], ['Tier', g.type],
      ['Check-in', formatDate(g.checkin)], ['Check-out', formatDate(g.checkout)],
      ['Email', g.email], ['Phone', g.phone], ['Nationality', g.nationality]

      `<div class="detail-row"><span class="detail-label">${label}</span><span>${sanitize(String(val))}</span></div>`
    ).join('');
  }

function startScanner() {
  if (!window.Html5QrcodeScanner && !window.Html5Qrcode) {
    if (!scannerLibLoaded) {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
      s.onload = () => { scannerLibLoaded = true; startScanner(); };
      document.head.appendChild(s);
      showToast('Loading scanner…', '');
      return;
    }
  }
  try {
    if (html5Scanner) { try { html5Scanner.clear(); } catch(e) {} }
    html5Scanner = new Html5QrcodeScanner('qr-reader', { fps: 10, qrbox: { width: 250, height: 250 } }, false);
    html5Scanner.render(async (decodedText) => {
      const guest = guests.find(g => g.id === decodedText);
      const el = document.getElementById('scan-result');
      if (guest) {
        const venue = selectedScanVenue.venue;
        const pts = selectedScanVenue.pts;
        // Award points via backend
        const oldPoints = guest.rewardPoints || 0;
        const newPoints = oldPoints + pts;
        const result = await callAppsScript('updateGuest', {
          guestId: guest.id,
          updates: {
            rewardPoints: newPoints,
            rewardNote: `Scanned at ${venue}`,
            staffName: currentUser?.data?.fullname || 'Scanner'
          }
        });
        if (result.success) {
          guest.rewardPoints = newPoints;
          await loadGuestsFromBackend(); // refresh full list
          const totalPts = newPoints;
          el.innerHTML = `<div class="scan-result-card success">
            <div class="scan-result-name">${sanitize(guest.first)} ${sanitize(guest.last)}</div>
            <div class="scan-result-detail">Room ${sanitize(guest.room || 'TBA')} · ${sanitize(guest.type)} · ${guest.verified ? '✅ Verified' : '⚠️ Not Verified'}</div>
            <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
              <span class="points-badge">+${pts} pts at ${sanitize(venue)}</span>
              <span style="font-size:12px;color:#166534;">Total: ${totalPts} pts</span>
            </div>
          </div>`;
          // Also increment scan count
          await callAppsScript('updateGuest', { guestId: guest.id, updates: { scans: (parseInt(guest.scans) || 0) + 1 } });
          await loadGuestsFromBackend();
          showToast(`✅ Scanned: ${sanitize(guest.first)} ${sanitize(guest.last)} · +${pts} pts`, 'ok');
          addLog(`QR scanned: ${guest.first} ${guest.last} (${guest.id}) at ${venue} — +${pts} pts`);
        } else {
          showToast('Failed to award points', 'err');
        }
      } else {
        el.innerHTML = `<div class="scan-result-card error"><div class="scan-result-name">Unknown QR Code</div><div class="scan-result-detail">ID not found: ${sanitize(decodedText)}</div></div>`;
      }
    }, () => {});
  } catch(e) { showToast('Scanner error: ' + e.message, 'err'); }
}

async function loadChartLib() {
  if (chartLibLoaded || typeof Chart !== 'undefined') { chartLibLoaded = true; return; }
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s.onload = () => { chartLibLoaded = true; resolve(); };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function renderAnalytics() {
  document.getElementById('total-guests').textContent = guests.length;
  document.getElementById('active-guests').textContent = guests.filter(g => g.status === 'Active').length;
  document.getElementById('verified-guests').textContent = guests.filter(g => g.verified).length;
  document.getElementById('total-scans').textContent = guests.reduce((sum, g) => sum + (parseInt(g.scans) || 0), 0);
  if (typeof Chart === 'undefined') return;
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const scansPerDay = days.map(() => Math.floor(Math.random() * 20 + 5));
  const actCtx = document.getElementById('activity-chart');
  if (actCtx) {
    if (activityChart) activityChart.destroy();
    activityChart = new Chart(actCtx, { type: 'bar', data: { labels: days, datasets: [{ label: 'Scans', data: scansPerDay, backgroundColor: 'rgba(201,168,76,0.7)', borderColor: '#c9a84c', borderWidth: 1 }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } } });
  }
  const tierCounts = {};
  guests.forEach(g => { const t = g.type || 'Standard'; tierCounts[t] = (tierCounts[t] || 0) + 1; });
  const typeCtx = document.getElementById('type-chart');
  if (typeCtx) {
    if (typeChart) typeChart.destroy();
    typeChart = new Chart(typeCtx, { type: 'doughnut', data: { labels: Object.keys(tierCounts), datasets: [{ data: Object.values(tierCounts), backgroundColor: ['#c9a84c','#0d7d7c','#7c2d3e','#6366f1','#e8d08a'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
  }
  const verCtx = document.getElementById('verify-chart');
  if (verCtx) {
    const verified = guests.filter(g => g.verified).length;
    const notVerified = guests.length - verified;
    if (verifyChart) verifyChart.destroy();
    verifyChart = new Chart(verCtx, { type: 'bar', data: { labels: ['Verified', 'Not Verified'], datasets: [{ data: [verified, notVerified], backgroundColor: ['#15803d','#b45309'] }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } } });
  }
}

function wireUploadListeners() {
  const areas = [
    { area: 'front-upload-area', input: 'id-front-input', status: 'front-status' },
    { area: 'back-upload-area', input: 'id-back-input', status: 'back-status' },
    { area: 'selfie-upload-area', input: 'selfie-input', status: 'selfie-status' },
  ];
  areas.forEach(({ area, input, status }) => {
    const areaEl = document.getElementById(area);
    const inputEl = document.getElementById(input);
    const statusEl = document.getElementById(status);
    if (!areaEl || !inputEl) return;
    inputEl.addEventListener('change', () => {
      if (inputEl.files[0]) {
        areaEl.classList.add('uploaded');
        if (statusEl) statusEl.textContent = `✓ ${inputEl.files[0].name}`;
      }
    });
    areaEl.addEventListener('dragover', e => { e.preventDefault(); areaEl.style.borderColor = 'var(--gold)'; });
    areaEl.addEventListener('dragleave', () => { areaEl.style.borderColor = ''; });
    areaEl.addEventListener('drop', e => { e.preventDefault(); areaEl.style.borderColor = ''; if (e.dataTransfer.files[0]) { inputEl.files = e.dataTransfer.files; inputEl.dispatchEvent(new Event('change')); } });
    areaEl.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); inputEl.click(); } });
  });
}

async function submitVerification() {
  if (!currentGuest) return;
  const idType = document.getElementById('verification-id-type')?.value;
  const idNumber = (document.getElementById('verification-id-number')?.value || '').trim();
  if (!idNumber) { showToast('Please enter your document number.', 'err'); return; }
  const request = {
    id: Date.now().toString(), guestId: currentGuest.id,
    guestName: `${currentGuest.first} ${currentGuest.last}`,
    idType, idNumber, status: 'pending', submittedAt: new Date().toISOString()
  };
  showSpinner('Submitting…');
  try {
    const result = await callAppsScript('submitVerification', { request });
    hideSpinner();
    if (result.success) {
      verificationRequests.push(request); saveLocal();
      showToast('✅ Verification request submitted!', 'ok');
      addLog(`${currentGuest.first} ${currentGuest.last} submitted verification`);
      closeVerificationModal();
      loadGuestDashboard();
    } else { showToast('Error submitting: ' + (result.error || 'unknown'), 'err'); }
  } catch(err) { hideSpinner(); showToast('Network error: ' + err.message, 'err'); }
}

function renderVerificationRequests() {
  const container = document.getElementById('verification-requests');
  if (!container) return;
  const pending = verificationRequests.filter(r => r.status === 'pending');
  if (!pending.length) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div>No pending requests</div>'; return; }
  container.innerHTML = pending.map(r => `
    <div class="verification-req-card" role="listitem">
      <div class="vreq-info">
        <div class="vreq-name">${sanitize(r.guestName || r.guestId)}</div>
        <div class="vreq-detail">${sanitize(r.idType)} · ${sanitize(r.idNumber)} · ${new Date(r.submittedAt).toLocaleString()}</div>
      </div>
      <div class="vreq-actions">
        <button class="btn-teal btn-sm" onclick="approveVerification('${r.id}','${r.guestId}')">✓ Approve</button>
        <button class="btn-danger btn-sm" onclick="rejectVerification('${r.id}')">✗ Reject</button>
      </div>
    </div>`).join('');
}

async function approveVerification(requestId, guestId) {
  showSpinner('Approving…');
  const result = await callAppsScript('updateVerification', { requestId, status: 'approved', guestId });
  hideSpinner();
  if (result.success) {
    const req = verificationRequests.find(r => r.id === requestId); if (req) req.status = 'approved';
    const guest = guests.find(g => g.id === guestId); if (guest) { guest.verified = true; guest.verifiedAt = new Date().toISOString(); }
    saveLocal(); renderVerificationRequests();
    showToast('✅ Verification approved', 'ok');
    addLog(`${currentUser?.data?.fullname} approved verification for guest ${guestId}`);
  } else { showToast('Error: ' + (result.error || 'unknown'), 'err'); }
}

async function rejectVerification(requestId) {
  showSpinner('Rejecting…');
  const result = await callAppsScript('updateVerification', { requestId, status: 'rejected', guestId: '' });
  hideSpinner();
  if (result.success) {
    const req = verificationRequests.find(r => r.id === requestId); if (req) req.status = 'rejected';
    saveLocal(); renderVerificationRequests();
    showToast('Verification rejected', '');
    addLog(`${currentUser?.data?.fullname} rejected verification request ${requestId}`);
  } else { showToast('Error: ' + (result.error || 'unknown'), 'err'); }
}

// ==================== AUTO-SUGGEST GUEST ID (Enhanced for spare rows) ====================
function suggestNextGuestId() {
  // Step 1: Find the smallest spare ID (existing row with blank first name)
  let spareIds = guests.filter(g => g.id && (!g.first || g.first.trim() === ''))
    .map(g => {
      const match = (g.id || '').match(/^SHR-(\d+)$/i);
      return match ? parseInt(match[1]) : null;
    })
    .filter(n => n !== null)
    .sort((a, b) => a - b);
  
  let nextId = null;
  if (spareIds.length > 0) {
    nextId = spareIds[0]; // smallest spare number
  } else {
    // No spare rows — find the next sequential number (max existing number + 1)
    let maxNum = 1000;
    guests.forEach(g => {
      const match = (g.id || '').match(/^SHR-(\d+)$/i);
      if (match) {
        const n = parseInt(match[1]);
        if (n > maxNum) maxNum = n;
      }
    });
    nextId = maxNum + 1;
  }
  
  const suggestedId = 'SHR-' + String(nextId).padStart(4, '0');
  const field = document.getElementById('f-mandatory-guest-id');
  const badge = document.getElementById('guest-id-auto-badge');
  if (field) {
    field.value = suggestedId;
    // Highlight that it's auto-suggested
    if (badge) badge.style.display = '';
    // Optional: add visual hint that it's automatically filled
    field.title = 'Auto-suggested based on available IDs. You may edit if needed.';
    // Update on manual input
    field.oninput = function() {
      if (badge) badge.style.display = (this.value === suggestedId) ? '' : 'none';
    };
  }
}

}
function showPanel(pid) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById(`panel-${pid}`);
  if (panel) panel.classList.add('active');
  const map = { 'staff-analytics': 'nav-analytics', 'staff-guests': 'nav-guests', 'staff-add': 'nav-add', 'staff-scanner': 'nav-scanner', 'staff-admin': 'nav-admin', 'staff-rewards': 'nav-rewards' };
  if (map[pid]) setSidebarActive(map[pid]);
  document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
  if (pid === 'staff-guests') { renderTable(); }
  if (pid === 'staff-admin') { renderStaffUsers(); renderVerificationRequests(); updateAdminStats(); }
  if (pid === 'staff-scanner') { document.getElementById('scan-result').innerHTML = ''; }
  if (pid === 'staff-analytics') { loadChartLib().then(() => renderAnalytics()); }
  if (pid === 'staff-rewards') { renderRewardsPanel(); }
  if (pid === 'staff-add') { suggestNextGuestId(); }
}
function showPanelMobile(pid, evt) {
  showPanel(pid);
  document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
  if (evt && evt.target) evt.target.classList.add('active');
}
function toggleSidebar() {
  const sidebar = document.getElementById('main-sidebar');
  const icon = document.getElementById('sidebar-toggle-icon');
  if (!sidebar) return;
  sidebar.classList.toggle('collapsed');
  if (sidebar.classList.contains('collapsed')) { if (icon) icon.textContent = '▶'; }
  else { if (icon) icon.textContent = '◀'; }
}

// ==================== SESSION APPLICATION ====================
function applyUserSession() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('main-app').classList.add('active');
  if (currentUser.type === 'guest') {
    const g = currentUser.data;
    document.getElementById('user-name').textContent = sanitize(`${g.first} ${g.last}`);
    document.getElementById('user-role').textContent = sanitize(g.type);
    document.getElementById('user-avatar').textContent = g.first.charAt(0).toUpperCase();
    document.querySelectorAll('.guest-only').forEach(el => el.style.display = 'block');
    document.querySelectorAll('.staff-only').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
    const sidebar = document.getElementById('main-sidebar');
    if (sidebar) sidebar.style.display = 'none';
    document.getElementById('mobile-nav-guest').style.display = 'flex';
    document.getElementById('mobile-nav-staff').style.display = 'none';
    const toggleBtn = document.getElementById('sidebar-toggle-btn');
    if (toggleBtn) toggleBtn.style.display = 'none';
    const syncInline = document.getElementById('sync-status-inline');
    if (syncInline) syncInline.style.display = 'none';
    loadGuestDashboard();
    showPanel('guest-dashboard');
  } else {
    const s = currentUser.data;
    const isAdmin = s.role === 'admin';
    document.getElementById('user-name').textContent = sanitize(s.fullname);
    document.getElementById('user-role').textContent = isAdmin ? 'Administrator' : 'Staff';
    document.getElementById('user-avatar').textContent = s.fullname.charAt(0).toUpperCase();
    document.querySelectorAll('.guest-only').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.staff-only').forEach(el => {
      if (el.id === 'main-sidebar' || el.id === 'mobile-nav-staff') el.style.display = 'flex';
      else el.style.display = 'block';
    });
    document.getElementById('mobile-nav-guest').style.display = 'none';
    const toggleBtn = document.getElementById('sidebar-toggle-btn');
    if (toggleBtn) toggleBtn.style.display = 'flex';
    const sidebar = document.getElementById('main-sidebar');
    if (sidebar) sidebar.classList.remove('collapsed');
    const icon = document.getElementById('sidebar-toggle-icon');
    if (icon) icon.textContent = '◀';
    const isSupervisor = s.role === 'supervisor';
    if (isAdmin) {
      document.querySelectorAll('.admin-only').forEach(el => { el.style.display = el.classList.contains('sidebar-btn') ? 'flex' : 'block'; });
      showPanel('staff-analytics');
      setSidebarActive('nav-analytics');
    } else if (isSupervisor) {
      document.querySelectorAll('.admin-only').forEach(el => {
        if (el.id === 'panel-staff-admin' || el.id === 'nav-admin') el.style.display = 'none';
        else el.style.display = el.classList.contains('sidebar-btn') ? 'flex' : 'block';
      });
      showPanel('staff-analytics');
      setSidebarActive('nav-analytics');
    } else {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
      showPanel('staff-guests');
      setSidebarActive('nav-guests');
    }
    const syncInline = document.getElementById('sync-status-inline');
    if (syncInline) syncInline.style.display = 'flex';
  }
}

function logout() {
  if (sessionTimer) clearInterval(sessionTimer);
  stopScanner();
  currentUser = null; currentGuest = null;
  sessionStorage.removeItem('steigenberger_session');
  document.getElementById('session-timer').classList.remove('visible');
  const syncInline = document.getElementById('sync-status-inline');
  if (syncInline) syncInline.style.display = 'none';
  document.getElementById('login-page').style.display = '';
  document.getElementById('main-app').classList.remove('active');
  switchTab('guest');
  showToast('You have been signed out.', '');
  clearLoginError();
}

async function restoreSession() {
  const saved = sessionStorage.getItem('steigenberger_session');
  if (!saved) return false;
  try {
    const session = JSON.parse(saved);
    const age = Date.now() - session.timestamp;
    if (age < SESSION_TIMEOUT_MINUTES * 60 * 1000) {
      if (session.type === 'guest') {
        await loadGuestsFromBackend();
        const guest = guests.find(g => g.id === session.data?.id);
        if (guest && guest.status === 'Active') {
          currentUser = { type: 'guest', data: guest }; currentGuest = guest;
          sessionEndTime = session.sessionEnd || (Date.now() + SESSION_TIMEOUT_MINUTES * 60 * 1000);
          applyUserSession(); startSessionTimer(); setupActivityListeners(); return true;
        }
      } else if (session.type === 'staff') {
        await loadStaffFromBackend();
        const staff = staffUsers.find(s => s.id === session.data?.id);
        if (staff && staff.accountStatus !== 'suspended') {
          currentUser = { type: 'staff', data: staff };
          sessionEndTime = session.sessionEnd || (Date.now() + SESSION_TIMEOUT_MINUTES * 60 * 1000);
          applyUserSession(); startSessionTimer(); setupActivityListeners();
          await Promise.all([loadGuestsFromBackend(), loadVerificationsFromBackend()]);
          return true;
        }
      }
    } else { sessionStorage.removeItem('steigenberger_session'); }
  } catch(e) {}
  return false;
}

// ==================== INIT ====================
async function init() {
  getCsrfToken();
  wireUploadListeners();
  await loadStaffFromBackend();
  await loadGuestsFromBackend();
  const today = new Date().toISOString().split('T')[0];
  const nextWeek = new Date(Date.now() + 7 * 86400000).toISOString().split('T')[0];
  const checkin = document.getElementById('f-checkin');
  const checkout = document.getElementById('f-checkout');
  if (checkin) checkin.value = today;
  if (checkout) checkout.value = nextWeek;
  const rewardVenueEl = document.getElementById('reward-venue');
  if (rewardVenueEl) {
    rewardVenueEl.addEventListener('change', () => {
      const customRow = document.getElementById('custom-pts-row');
      if (customRow) customRow.style.display = rewardVenueEl.value.startsWith('Custom') ? 'block' : 'none';
    });
  }
  wireOTPInputs();
  const restored = await restoreSession();
  if (!restored) {
    const params = new URLSearchParams(window.location.search);
    const guestId = params.get('guest');
    if (guestId) {
      const guest = guests.find(g => g.id === decodeURIComponent(guestId));
      if (guest && guest.status === 'Active') {
        currentUser = { type: 'guest', data: guest }; currentGuest = guest;
        saveSession(); applyUserSession(); startSessionTimer(); setupActivityListeners();
        showToast(`Welcome, ${sanitize(guest.first)}! 🌟`, 'ok');
      }
    }
  }
  // Hide leftover buttons
  document.querySelectorAll('#force-sync-btn, [onclick="testSheetDBConnection()"]').forEach(el => el.remove());
}

init();
</script>
